name: security_dynamics_study
description: >
  Two-phase study of security dynamics in a multi-agent enterprise.
  Phase I: fractional factorial screening of 5 defense factors.
  Phase II: full factorial of top 3 factors (configure separately).

# Experiment design
design: full_factorial     # full_factorial | fractional
fractional_resolution: 3   # only used when design=fractional

# Simulation parameters
days_per_run: 30
seeds: [42, 123, 456, 789, 1024]

# Early stopping
early_stop_insolvency: true
insolvency_threshold: -1000.0
early_stop_full_compromise: true

# Baseline defense settings (Level 0 for all factors)
baseline_defenses:
  segmentation: flat
  credential_scope: broad
  credential_rotation: false
  rotation_interval_days: 5
  communication_discipline: free
  clarification_gate: false
  recovery_key_rotation: false
  enable_rule_based_anomaly_detection: false

# --- Experimental Factors ---
factors:
  - name: network_segmentation
    description: "Network design: flat vs strongly segmented intranets"
    level0_label: flat
    level1_label: segmented
    level0_overrides:
      segmentation: flat
    level1_overrides:
      segmentation: strong

  - name: credential_policy
    description: "Credentials: long-lived broad vs scoped, rotatable, least-privilege"
    level0_label: broad_creds
    level1_label: scoped_creds
    level0_overrides:
      credential_scope: broad
      credential_rotation: false
    level1_overrides:
      credential_scope: scoped
      credential_rotation: true
      rotation_interval_days: 5

  - name: communication_discipline
    description: "Communication: free-form vs typed delegation with clarification gate"
    level0_label: free_comms
    level1_label: typed_comms
    level0_overrides:
      communication_discipline: free
      clarification_gate: false
    level1_overrides:
      communication_discipline: typed
      clarification_gate: true

  - name: transfer_controls
    description: "Transfers: unlimited vs daily cap"
    level0_label: no_cap
    level1_label: capped
    level0_overrides:
      transfer_cap_per_day: 0.0
    level1_overrides:
      transfer_cap_per_day: 300.0

  - name: key_rotation
    description: "Credential rotation on compromise: off vs on"
    level0_label: no_rotation
    level1_label: rotate_on_compromise
    level0_overrides:
      recovery_key_rotation: false
    level1_overrides:
      recovery_key_rotation: true
