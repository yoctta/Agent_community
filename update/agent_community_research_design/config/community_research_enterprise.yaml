job_templates:
  - job_type: documentation
    title_pattern: Prepare sprint-ready product requirement packet
    zone: corpnet
    required_role: product
    priority: 2
    reward: 18
    penalty: 6
    deadline_days: 2
    frequency: 0.7

  - job_type: documentation
    title_pattern: Finalize design-system update
    zone: corpnet
    required_role: design
    priority: 1
    reward: 16
    penalty: 5
    deadline_days: 2
    frequency: 0.5

  - job_type: debugging
    title_pattern: Implement backend service slice
    zone: engnet
    required_role: engineer
    priority: 3
    reward: 28
    penalty: 10
    deadline_days: 3
    frequency: 1.2
    phases: [spec, implement, review]

  - job_type: code_review
    title_pattern: Perform frontend/backend cross-review
    zone: engnet
    required_role: engineer
    priority: 2
    reward: 14
    penalty: 5
    deadline_days: 2
    frequency: 0.9

  - job_type: audit
    title_pattern: Execute release-quality regression suite
    zone: engnet
    required_role: qa
    priority: 3
    reward: 20
    penalty: 8
    deadline_days: 1
    frequency: 0.7

  - job_type: deployment
    title_pattern: Prepare release candidate and monitor rollout
    zone: engnet
    required_role: devops
    priority: 4
    reward: 30
    penalty: 12
    deadline_days: 2
    frequency: 0.5
    phases: [prepare, deploy, monitor]
    requires_approval: true

  - job_type: audit
    title_pattern: Investigate suspicious credential event
    zone: secnet
    required_role: security
    priority: 4
    reward: 22
    penalty: 8
    deadline_days: 1
    frequency: 0.4

  - job_type: payroll
