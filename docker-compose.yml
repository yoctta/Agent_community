# ACES — Agent Community Enterprise Simulator
#
# Runs a 12-agent enterprise where each agent is a fully autonomous
# OpenClaw instance with its own gateway, workspace, and LLM connection.
#
# Quick start:
#   1. cp .env.example .env          # add your LLM_API_KEY
#   2. python docker/generate_agent_configs.py   # create agent workspaces
#   3. docker compose up             # start all agents + simulator
#
# To run with mock agents (no LLM, no OpenClaw):
#   docker compose run simulator single --backend mock --seed 42

x-openclaw-agent: &openclaw-agent
  image: openclaw/openclaw:latest
  restart: unless-stopped
  env_file: .env
  environment:
    - LLM_API_KEY=${LLM_API_KEY}

services:
  # ---------------------------------------------------------------
  # Simulator (ACES engine)
  # ---------------------------------------------------------------
  simulator:
    build: .
    env_file: .env
    depends_on:
      mgr-alice:  { condition: service_started }
      mgr-bob:    { condition: service_started }
      eng-carol:  { condition: service_started }
      eng-dave:   { condition: service_started }
      eng-eve:    { condition: service_started }
      fin-frank:  { condition: service_started }
      fin-grace:  { condition: service_started }
      hr-henry:   { condition: service_started }
      hr-iris:    { condition: service_started }
      sec-jack:   { condition: service_started }
      sec-karen:  { condition: service_started }
      sup-leo:    { condition: service_started }
    volumes:
      - ./config:/app/config
      - ./results:/app/results
    command:
      - "run"
      - "--backend=openclaw"
      - "--output=/app/results"

  # ---------------------------------------------------------------
  # OpenClaw agent gateways (one per agent)
  # ---------------------------------------------------------------
  mgr-alice:
    <<: *openclaw-agent
    hostname: mgr_alice
    volumes:
      - ./docker/agents/mgr_alice:/root/.openclaw
    ports: ["18701:18701"]

  mgr-bob:
    <<: *openclaw-agent
    hostname: mgr_bob
    volumes:
      - ./docker/agents/mgr_bob:/root/.openclaw
    ports: ["18702:18702"]

  eng-carol:
    <<: *openclaw-agent
    hostname: eng_carol
    volumes:
      - ./docker/agents/eng_carol:/root/.openclaw
    ports: ["18703:18703"]

  eng-dave:
    <<: *openclaw-agent
    hostname: eng_dave
    volumes:
      - ./docker/agents/eng_dave:/root/.openclaw
    ports: ["18704:18704"]

  eng-eve:
    <<: *openclaw-agent
    hostname: eng_eve
    volumes:
      - ./docker/agents/eng_eve:/root/.openclaw
    ports: ["18705:18705"]

  fin-frank:
    <<: *openclaw-agent
    hostname: fin_frank
    volumes:
      - ./docker/agents/fin_frank:/root/.openclaw
    ports: ["18706:18706"]

  fin-grace:
    <<: *openclaw-agent
    hostname: fin_grace
    volumes:
      - ./docker/agents/fin_grace:/root/.openclaw
    ports: ["18707:18707"]

  hr-henry:
    <<: *openclaw-agent
    hostname: hr_henry
    volumes:
      - ./docker/agents/hr_henry:/root/.openclaw
    ports: ["18708:18708"]

  hr-iris:
    <<: *openclaw-agent
    hostname: hr_iris
    volumes:
      - ./docker/agents/hr_iris:/root/.openclaw
    ports: ["18709:18709"]

  sec-jack:
    <<: *openclaw-agent
    hostname: sec_jack
    volumes:
      - ./docker/agents/sec_jack:/root/.openclaw
    ports: ["18710:18710"]

  sec-karen:
    <<: *openclaw-agent
    hostname: sec_karen
    volumes:
      - ./docker/agents/sec_karen:/root/.openclaw
    ports: ["18711:18711"]

  sup-leo:
    <<: *openclaw-agent
    hostname: sup_leo
    volumes:
      - ./docker/agents/sup_leo:/root/.openclaw
    ports: ["18712:18712"]
