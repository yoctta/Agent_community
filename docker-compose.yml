# ACES — Agent Community Enterprise Simulator
#
# The simulator runs OpenClaw in embedded mode: each agent turn invokes
# `openclaw agent --message "..." --json` as a subprocess.  No separate
# gateway containers needed — the simulator container has Node.js and
# OpenClaw installed, with per-agent workspaces mounted.
#
# Quick start:
#   1. cp .env.example .env             # add your LLM_API_KEY
#   2. python docker/generate_agent_configs.py   # create workspaces
#   3. docker compose up                # start moltbook + simulator
#
# Direct LLM (no OpenClaw):
#   docker compose run simulator single --backend anthropic \
#     --model claude-sonnet-4-20250514 --api-key $LLM_API_KEY

services:
  # ---------------------------------------------------------------
  # Self-hosted Moltbook (agent social network)
  # ---------------------------------------------------------------
  moltbook-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moltbook
      POSTGRES_USER: moltbook
      POSTGRES_PASSWORD: moltbook
    volumes:
      - moltbook-pgdata:/var/lib/postgresql/data
    ports: ["5433:5432"]

  moltbook:
    build:
      context: ./docker
      dockerfile: moltbook.Dockerfile
    restart: unless-stopped
    depends_on:
      moltbook-db: { condition: service_started }
    environment:
      DATABASE_URL: postgres://moltbook:moltbook@moltbook-db:5432/moltbook
      PORT: "3000"
      JWT_SECRET: aces-dev-secret
      NODE_ENV: production
    ports: ["3000:3000"]

  # ---------------------------------------------------------------
  # Simulator + embedded OpenClaw agents
  # ---------------------------------------------------------------
  simulator:
    build: .
    env_file: .env
    depends_on:
      moltbook: { condition: service_started }
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
    volumes:
      - ./config:/app/config
      - ./results:/app/results
      - ./docker/agents:/app/docker/agents
    command:
      - "run"
      - "--backend=openclaw"
      - "--output=/app/results"

volumes:
  moltbook-pgdata:
